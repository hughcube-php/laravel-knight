name: Bug Report
description: Report a bug to help us improve
labels: ["bug"]
body:
  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "e.g. 8.1"
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel Version
      placeholder: "e.g. 10.x"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package Version
      placeholder: "e.g. 6.0.119"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
