name: Test

on: [ push, pull_request ]

jobs:
  run-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 15
      matrix: &matrix
        php: [ 7.4, 8.0, 8.1, 8.2, 8.3, 8.4, 8.5 ]
        laravel: [ 8, 9, 10, 11, 12, 13 ]
    name: PHP ${{ matrix.php }} Laravel ${{ matrix.laravel }} Test on ubuntu-latest
    env:
      TEST_PGSQL_HOST: 127.0.0.1
      TEST_PGSQL_PORT: 5432
      TEST_PGSQL_DATABASE: knight_test
      TEST_PGSQL_USERNAME: knight
      TEST_PGSQL_PASSWORD: knight
      TEST_MYSQL_HOST: 127.0.0.1
      TEST_MYSQL_PORT: 3306
      TEST_MYSQL_DATABASE: knight_test
      TEST_MYSQL_USERNAME: knight
      TEST_MYSQL_PASSWORD: knight
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    steps: &common_steps
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup PHP
        uses: shivammathur/setup-php@master
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xdebug, opcache, fileinfo, pdo, pdo_mysql, pdo_pgsql, redis, pdo_sqlite, sqlite3 #optional, setup extensions
          tools: composer:v2
          ini-values: post_max_size=256M, short_open_tag=On, opcache.enable_cli=1 #optional, setup php.ini configuration

      - name: Start local MySQL service
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo systemctl start mysql.service
          sudo mysql <<'SQL'
          CREATE DATABASE IF NOT EXISTS knight_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'knight'@'127.0.0.1' IDENTIFIED BY 'knight';
          CREATE USER IF NOT EXISTS 'knight'@'localhost' IDENTIFIED BY 'knight';
          ALTER USER 'knight'@'127.0.0.1' IDENTIFIED BY 'knight';
          ALTER USER 'knight'@'localhost' IDENTIFIED BY 'knight';
          GRANT ALL PRIVILEGES ON knight_test.* TO 'knight'@'127.0.0.1';
          GRANT ALL PRIVILEGES ON knight_test.* TO 'knight'@'localhost';
          FLUSH PRIVILEGES;
          SQL
          mysqladmin --protocol=tcp -h 127.0.0.1 -P 3306 -u knight -pknight ping

      - name: Start local PostgreSQL and Redis services
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          PG_MAJOR="$(psql -V | awk '{print $3}' | cut -d. -f1)"
          sudo apt-get update
          sudo apt-get install -y "postgresql-${PG_MAJOR}-wal2json" redis-server

          sudo systemctl start postgresql.service
          sudo -u postgres psql -v ON_ERROR_STOP=1 <<'SQL'
          ALTER SYSTEM SET wal_level = 'logical';
          ALTER SYSTEM SET max_replication_slots = '10';
          ALTER SYSTEM SET max_wal_senders = '10';
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'knight') THEN
              CREATE ROLE knight LOGIN PASSWORD 'knight' REPLICATION;
            ELSE
              ALTER ROLE knight WITH LOGIN PASSWORD 'knight' REPLICATION;
            END IF;
          END
          $$;
          SQL

          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = 'knight_test'" | grep -q 1; then
            sudo -u postgres createdb -O knight knight_test
          fi

          sudo systemctl restart postgresql.service
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U knight -d knight_test; then
              break
            fi
            sleep 1
          done
          PGPASSWORD=knight psql -h 127.0.0.1 -U knight -d knight_test -c "SELECT current_setting('wal_level')"

          sudo systemctl start redis-server.service
          redis-cli ping

      - name: System Setting
        run: |
          php -v
          composer -V
          php -m

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Install dependencies
        run: |
          echo "has_deps=false" >> "$GITHUB_ENV"
          composer config --no-plugins audit.block-insecure false
          composer require laravel/framework:^${{ matrix.laravel }} --dev --no-update --prefer-stable
          composer update --prefer-stable --prefer-dist --no-interaction --no-progress
          echo "has_deps=true" >> "$GITHUB_ENV"
        continue-on-error: true

      - name: Composer Info
        if: ${{ 'true' == env.has_deps }}
        run: composer info

      - name: Run PHPUnit
        if: ${{ 'true' == env.has_deps }}
        run: composer run-script test -- -c phpunit.xml.dist --testdox

  run-macos:
    runs-on: macOS-latest
    strategy:
      max-parallel: 15
      matrix: *matrix
    name: PHP ${{ matrix.php }} Laravel ${{ matrix.laravel }} Test on macOS-latest
    steps: *common_steps

  run-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    strategy:
      max-parallel: 15
      matrix: *matrix
    name: PHP ${{ matrix.php }} Laravel ${{ matrix.laravel }} Test on windows-latest
    steps: *common_steps
